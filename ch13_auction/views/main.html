{% extends 'layout.html' %} {% block content %}
<div class="timeline">
  <h2>경매 진행 목록</h2>
  <table id="good-list">
    <tr>
      <th>상품명</th>
      <th>이미지</th>
      <th>시작 가격</th>
      <th>종료 시간</th>
      <th>입장</th>
    </tr>
    {% for good in goods %}
    <tr>
      <td>{{good.name}}</td>
      <td>
        <img src="/img/{{good.img}}" />
      </td>
      <td>{{good.price}}</td>
      <td class="time" data-start="{{good.createdAt}}">00:00:00</td>
      <td>
        <a href="/good/{{good.id}}" class="enter btn">입장</a>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
<script>
  const es = new EventSource("/sse");

  const handleSseMsg = (e) => {
    document.querySelectorAll(".time").forEach((td) => {
      const end = new Date(td.dataset.start);
      const serverTime = new Date(parseInt(e.data, 10));
      end.setDate(end.getDate() + 1);
      if (serverTime >= end) {
        td.textContent = "00:00:00";
      } else {
        const t = end - serverTime;
        const seconds = ("0" + Math.floor((t / 1000) % 60)).slice(-2);
        const minutes = ("0" + Math.floor((t / 1000 / 60) % 60)).slice(-2);
        const hours = ("0" + Math.floor((t / (1000 * 60 * 60)) % 24)).slice(-2);
        td.textContent = hours + ":" + minutes + ":" + seconds;
      }
    });
  };

  es.addEventListener("message", handleSseMsg);
</script>
{% endblock %}
